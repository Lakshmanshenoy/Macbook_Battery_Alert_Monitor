name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint GitHub workflows
        uses: reviewdog/action-actionlint@v1

  static-security:
    runs-on: ubuntu-latest
    needs: workflow-lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies and audit tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit
      - name: Type check
        run: |
          mypy src/battery_alert/ --ignore-missing-imports --strict
      - name: Run lint
        run: |
          ruff check src/ tests/ --select E,F,W,I --ignore E501 --exclude src/battery_alert/legacy_app.py
      - name: Run dependency vulnerability audit
        run: |
          pip-audit -r requirements.txt --progress-spinner off

  test:
    runs-on: ${{ matrix.os }}
    needs: [workflow-lint, static-security]
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ['3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Remove existing virtual environment
        run: |
          if [ -d "venv" ]; then
            rm -rf venv
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run project checks gate
        run: |
          bash scripts/checks.sh --ci
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          pytest tests/ --cov=src/battery_alert --cov-config=.coveragerc --cov-report=term-missing --cov-fail-under=70
      - name: Verify artifact integrity script in CI
        if: matrix.os == 'macos-latest' && matrix.python-version == '3.10'
        run: |
          mkdir -p tmp_release
          printf 'phase7-ci-artifact' > tmp_release/BattMon.dmg
          bash scripts/generate_checksums.sh tmp_release/BattMon.dmg
          python3 scripts/verify_release_artifacts.py \
            --artifact tmp_release/BattMon.dmg \
            --checksums checksums.txt
      - name: Upload synthetic release artifact
        if: matrix.os == 'macos-latest' && matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
          name: ci-synthetic-release
          path: |
            tmp_release/BattMon.dmg
            checksums.txt

  verify-uploaded-artifact:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Download uploaded artifact bundle
        uses: actions/download-artifact@v4
        with:
          name: ci-synthetic-release
          path: downloaded_artifacts
      - name: Verify downloaded artifact integrity
        run: |
          python3 scripts/verify_release_artifacts.py \
            --artifact downloaded_artifacts/tmp_release/BattMon.dmg \
            --checksums downloaded_artifacts/checksums.txt
