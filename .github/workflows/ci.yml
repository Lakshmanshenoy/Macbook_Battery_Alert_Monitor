name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint GitHub workflows
        uses: reviewdog/action-actionlint@v1

  test:
    runs-on: ${{ matrix.os }}
    needs: workflow-lint
    strategy:
      matrix:
        os: [macos-latest]
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Remove existing virtual environment
        run: |
          if [ -d "venv" ]; then
            rm -rf venv
          fi
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          pytest -q
      - name: Run release smoke test
        run: |
          python3 scripts/release_smoke_test.py
      - name: Verify artifact integrity script in CI
        run: |
          mkdir -p tmp_release
          printf 'phase7-ci-artifact' > tmp_release/Battery\ Alert.dmg
          bash scripts/generate_checksums.sh tmp_release/Battery\ Alert.dmg
          python3 scripts/verify_release_artifacts.py \
            --artifact tmp_release/Battery\ Alert.dmg \
            --checksums checksums.txt
      - name: Upload synthetic release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-synthetic-release
          path: |
            tmp_release/Battery Alert.dmg
            checksums.txt

  verify-uploaded-artifact:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Download uploaded artifact bundle
        uses: actions/download-artifact@v4
        with:
          name: ci-synthetic-release
          path: downloaded_artifacts
      - name: Verify downloaded artifact integrity
        run: |
          python3 scripts/verify_release_artifacts.py \
            --artifact downloaded_artifacts/tmp_release/Battery\ Alert.dmg \
            --checksums downloaded_artifacts/checksums.txt
