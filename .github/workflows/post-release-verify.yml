name: Post Release Verification

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to verify (for example v1.2.0)
        required: true
        type: string

jobs:
  verify-published-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          python3 scripts/verify_published_release.py \
            --owner Lakshmanshenoy \
            --repo battmon-macos \
            --tag "$RELEASE_TAG" \
            --token "$GH_TOKEN" \
            --download-dir downloaded_release_assets
