name: Release Build

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-latest
    env:
      APP_NAME: "Battery Alert"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Build app
        run: |
          bash build.sh

      - name: Create DMG
        run: |
          bash create_dmg.sh

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 "dist/${APP_NAME}.dmg" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload DMG
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          artifacts: "dist/${APP_NAME}.dmg"
