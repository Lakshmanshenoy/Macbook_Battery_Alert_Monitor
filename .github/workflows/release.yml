name: Release macOS build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (PyInstaller)
        run: |
          bash build.sh

      - name: Import Developer ID certificate
        env:
          MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          if [[ -z "$MACOS_SIGNING_CERT_BASE64" || -z "$MACOS_SIGNING_CERT_PASSWORD" ]]; then
            echo "Skipping certificate import (signing secrets not configured)."
            exit 0
          fi
          echo "$MACOS_SIGNING_CERT_BASE64" | base64 --decode > signing_cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import signing_cert.p12 -k build.keychain -P "$MACOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Codesign app bundle
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
        run: |
          if [[ -z "$MACOS_SIGNING_IDENTITY" || -z "$MACOS_SIGNING_CERT_BASE64" ]]; then
            echo "Skipping app codesign (identity or cert secret not configured)."
            exit 0
          fi
          codesign --deep --force --options runtime --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" "dist/Battery Alert.app"

      - name: Verify app signature
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
        run: |
          if [[ -z "$MACOS_SIGNING_IDENTITY" || -z "$MACOS_SIGNING_CERT_BASE64" ]]; then
            echo "Skipping app signature verification (identity or cert secret not configured)."
            exit 0
          fi
          codesign --verify --deep --strict --verbose=2 "dist/Battery Alert.app"

      - name: Create DMG
        run: |
          bash create_dmg.sh

      - name: Codesign DMG
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
        run: |
          if [[ -z "$MACOS_SIGNING_IDENTITY" || -z "$MACOS_SIGNING_CERT_BASE64" ]]; then
            echo "Skipping DMG codesign (identity or cert secret not configured)."
            exit 0
          fi
          codesign --force --timestamp --sign "$MACOS_SIGNING_IDENTITY" "Battery Alert.dmg"

      - name: Verify DMG signature
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_CERT_BASE64: ${{ secrets.MACOS_SIGNING_CERT_BASE64 }}
        run: |
          if [[ -z "$MACOS_SIGNING_IDENTITY" || -z "$MACOS_SIGNING_CERT_BASE64" ]]; then
            echo "Skipping DMG signature verification (identity or cert secret not configured)."
            exit 0
          fi
          codesign --verify --deep --strict --verbose=2 "Battery Alert.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Skipping notarization (Apple notarization secrets not configured)."
            exit 0
          fi
          xcrun notarytool submit "Battery Alert.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Skipping stapling (Apple notarization secrets not configured)."
            exit 0
          fi
          xcrun stapler staple "Battery Alert.dmg"

      - name: Validate stapled ticket
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -z "$APPLE_ID" || -z "$APPLE_APP_SPECIFIC_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Skipping stapled ticket validation (Apple notarization secrets not configured)."
            exit 0
          fi
          xcrun stapler validate "Battery Alert.dmg"

      - name: Generate SHA256 checksums
        run: |
          mkdir -p release_artifacts
          cp "Battery Alert.dmg" release_artifacts/
          bash scripts/generate_checksums.sh release_artifacts/"Battery Alert.dmg"

      - name: GPG sign checksums
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Import maintainer private key from secret
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Sign with passphrase from secret
          gpg --batch --yes --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign --output checksums.txt.asc checksums.txt
          # Export public key for users
          gpg --armor --export > release_artifacts/maintainer_public_key.asc
          cp checksums.txt release_artifacts/checksums.txt
          cp checksums.txt.asc release_artifacts/checksums.txt.asc

      - name: Verify checksums
        run: |
          shasum -a 256 -c checksums.txt

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: release_artifacts/

      - name: Cleanup signing artifacts
        if: always()
        run: |
          rm -f signing_cert.p12 || true
          security delete-keychain build.keychain || true

      - name: Create GitHub Release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_DRAFT.md
          files: |
            release_artifacts/Battery Alert.dmg
            release_artifacts/checksums.txt
            release_artifacts/checksums.txt.asc
            release_artifacts/maintainer_public_key.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
