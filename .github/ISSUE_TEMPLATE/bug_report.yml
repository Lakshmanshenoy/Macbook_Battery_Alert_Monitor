name: Bug report
description: Something is not working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set threshold to...
        2. Disconnect charger...
        3. Expected alert, got none
    validations:
      required: true
  - type: dropdown
    id: macos_version
    attributes:
      label: macOS version
      options:
        - Sequoia (15)
        - Sonoma (14)
        - Ventura (13)
        - Monterey (12)
        - Earlier
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste output from Menu -> Copy Support Diagnostics
